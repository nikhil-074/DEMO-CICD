version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/html

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_nginx.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/deploy_notify.sh
      arguments: ["auto", "CodeDeploy"]  # auto detects success/failure
      timeout: 60
      runas: root
